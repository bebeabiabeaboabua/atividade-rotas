<section class="title">
<h1>Users</h1>
</section>

<section class="container">
@if(isLoading){
<p>Loading...</p>
}@else {
  @for (user of users; track user.id){
  <section class="users">
    <ul class="list">
  <li class="name">
    <span>Name:</span> {{ user.name }}
  </li>
  <li class="email">
     <span>Email:</span> {{ user.email }}
  </li>
  <li class="city">
    <span>City:</span> {{user.address.city}}
  </li>
   </ul>
   <section class="button-details">
   <button class="details" [routerLink]="['/details', user.id]">Details</button>
   </section>
  </section>
  }

}
</section>
